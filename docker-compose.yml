services:
  9router:
    build:
      context: .
      dockerfile: Dockerfile
    image: 9router:latest
    container_name: 9router
    restart: unless-stopped
    ports:
      - "443:443"
      - "20128:20128"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - HOSTNAME=0.0.0.0
      - PORT=20128
      - NODE_ENV=production
      # Disable request/usage observability writes — keeps DB config-only.
      # Trade-off: dashboard "Request History" + "Usage" charts show empty.
      - OBSERVABILITY_ENABLED=false
